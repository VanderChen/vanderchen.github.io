<script>
(function() {
  const graph = JSON.parse(document.getElementById('tag-graph-data').textContent);
  const svg = document.getElementById('tag-graph-svg');
  const details = document.getElementById('tag-graph-details');
  const search = document.getElementById('tag-graph-search');
  const weight = document.getElementById('tag-graph-weight');
  const reset = document.getElementById('tag-graph-reset');
  const empty = document.getElementById('tag-graph-empty');
  const ns = 'http://www.w3.org/2000/svg';
  let selected = null;
  let visibleNodes = [];
  let visibleEdges = [];
  let animationFrame = null;

  function html(value) {
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function createSvg(tag, attrs) {
    const element = document.createElementNS(ns, tag);
    Object.keys(attrs || {}).forEach(key => element.setAttribute(key, attrs[key]));
    return element;
  }

  function radius(node) {
    return 14 + Math.sqrt(node.count) * 7;
  }

  function matchesQuery(node, query) {
    if (!query) return true;
    const text = [
      node.label,
      node.posts.map(post => post.title).join(' ')
    ].join(' ').toLowerCase();
    return text.includes(query);
  }

  function relatedTagIds(id) {
    const related = new Set([id]);
    graph.edges.forEach(edge => {
      if (edge.source === id) related.add(edge.target);
      if (edge.target === id) related.add(edge.source);
    });
    return related;
  }

  function renderDetails(node) {
    if (!node) {
      const topTags = graph.nodes.slice(0, 12).map(tag => (
        '<a class="tag-graph-chip" href="' + html(tag.url) + '">' + html(tag.label) + '<span>' + tag.count + '</span></a>'
      )).join('');
      details.innerHTML =
        '<h3>Overview</h3>' +
        '<p>Select a tag to inspect related posts and direct tag connections.</p>' +
        '<div class="tag-graph-chip-row">' + topTags + '</div>';
      return;
    }

    const directEdges = graph.edges.filter(edge => edge.source === node.id || edge.target === node.id);
    const related = directEdges
      .sort((a, b) => b.weight - a.weight)
      .map(edge => {
        const other = edge.source === node.id ? edge.target : edge.source;
        return '<span class="tag-graph-chip">' + html(other) + '<span>' + edge.weight + '</span></span>';
      })
      .join('');
    const posts = node.posts.map(post => (
      '<article class="tag-graph-post"><a href="' + html(post.url) + '">' + html(post.title) + '</a>' +
      (post.date ? '<time datetime="' + html(post.date) + '">' + html(post.date) + '</time>' : '') + '</article>'
    )).join('');

    details.innerHTML =
      '<h3>' + html(node.label) + '</h3>' +
      '<p>' + node.count + ' post' + (node.count > 1 ? 's' : '') + '</p>' +
      '<a class="tag-graph-chip" href="' + html(node.url) + '">Open tag page</a>' +
      (related ? '<div class="tag-graph-chip-row">' + related + '</div>' : '<p>No direct tag connections yet.</p>') +
      '<div class="tag-graph-posts">' + posts + '</div>';
  }

  function layout(width, height) {
    const centerX = width / 2;
    const centerY = height / 2;
    const count = Math.max(visibleNodes.length, 1);
    const orbit = Math.max(90, Math.min(width, height) * 0.34);

    visibleNodes.forEach((node, index) => {
      if (typeof node.x !== 'number' || typeof node.y !== 'number') {
        const angle = (Math.PI * 2 * index) / count;
        node.x = centerX + Math.cos(angle) * orbit;
        node.y = centerY + Math.sin(angle) * orbit;
        node.vx = 0;
        node.vy = 0;
      }
    });

    for (let tick = 0; tick < 180; tick++) {
      for (let i = 0; i < visibleNodes.length; i++) {
        for (let j = i + 1; j < visibleNodes.length; j++) {
          const a = visibleNodes[i];
          const b = visibleNodes[j];
          const dx = b.x - a.x || 0.01;
          const dy = b.y - a.y || 0.01;
          const distance = Math.sqrt(dx * dx + dy * dy);
          const push = Math.min(7, 1200 / (distance * distance));
          const nx = dx / distance;
          const ny = dy / distance;
          a.vx -= nx * push;
          a.vy -= ny * push;
          b.vx += nx * push;
          b.vy += ny * push;
        }
      }

      visibleEdges.forEach(edge => {
        const source = visibleNodes.find(node => node.id === edge.source);
        const target = visibleNodes.find(node => node.id === edge.target);
        if (!source || !target) return;
        const dx = target.x - source.x;
        const dy = target.y - source.y;
        const distance = Math.sqrt(dx * dx + dy * dy) || 1;
        const desired = 140 - Math.min(edge.weight, 8) * 8;
        const pull = (distance - desired) * 0.012;
        const nx = dx / distance;
        const ny = dy / distance;
        source.vx += nx * pull;
        source.vy += ny * pull;
        target.vx -= nx * pull;
        target.vy -= ny * pull;
      });

      visibleNodes.forEach(node => {
        node.vx += (centerX - node.x) * 0.006;
        node.vy += (centerY - node.y) * 0.006;
        node.vx *= 0.82;
        node.vy *= 0.82;
        node.x = Math.max(radius(node) + 10, Math.min(width - radius(node) - 10, node.x + node.vx));
        node.y = Math.max(radius(node) + 18, Math.min(height - radius(node) - 18, node.y + node.vy));
      });
    }
  }

  function draw() {
    const width = svg.clientWidth || 720;
    const height = svg.clientHeight || 520;
    svg.setAttribute('viewBox', '0 0 ' + width + ' ' + height);
    svg.textContent = '';

    if (!visibleNodes.length) {
      empty.style.display = 'grid';
      return;
    }

    empty.style.display = 'none';
    layout(width, height);

    const selectedRelated = selected ? relatedTagIds(selected.id) : new Set();
    const edgeLayer = createSvg('g');
    const nodeLayer = createSvg('g');
    svg.appendChild(edgeLayer);
    svg.appendChild(nodeLayer);

    visibleEdges.forEach(edge => {
      const source = visibleNodes.find(node => node.id === edge.source);
      const target = visibleNodes.find(node => node.id === edge.target);
      if (!source || !target) return;

      const line = createSvg('line', {
        class: 'tag-graph-link' + (selected && (edge.source === selected.id || edge.target === selected.id) ? ' is-selected' : selected ? ' is-muted' : ''),
        x1: source.x,
        y1: source.y,
        x2: target.x,
        y2: target.y,
        'stroke-width': 1.2 + Math.sqrt(edge.weight) * 1.8
      });
      edgeLayer.appendChild(line);
    });

    visibleNodes.forEach(node => {
      const group = createSvg('g', {
        class: 'tag-graph-node' + (selected && node.id === selected.id ? ' is-selected' : selected && !selectedRelated.has(node.id) ? ' is-muted' : ''),
        transform: 'translate(' + node.x + ' ' + node.y + ')',
        tabindex: '0',
        role: 'button',
        'aria-label': node.label + ', ' + node.count + ' posts'
      });
      const circle = createSvg('circle', { r: radius(node) });
      const text = createSvg('text', {
        'text-anchor': 'middle',
        y: radius(node) + 16
      });
      text.textContent = node.label;
      group.appendChild(circle);
      group.appendChild(text);
      group.addEventListener('click', function() {
        selected = selected && selected.id === node.id ? null : node;
        renderDetails(selected);
        scheduleDraw();
      });
      group.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          group.dispatchEvent(new MouseEvent('click'));
        }
      });
      nodeLayer.appendChild(group);
    });
  }

  function scheduleDraw() {
    if (animationFrame) cancelAnimationFrame(animationFrame);
    animationFrame = requestAnimationFrame(draw);
  }

  function applyFilters() {
    const query = search.value.trim().toLowerCase();
    const minWeight = Number(weight.value || 1);
    const nodeIds = new Set();

    visibleEdges = graph.edges.filter(edge => edge.weight >= minWeight);
    visibleEdges.forEach(edge => {
      nodeIds.add(edge.source);
      nodeIds.add(edge.target);
    });

    visibleNodes = graph.nodes.filter(node => {
      const connected = nodeIds.size ? nodeIds.has(node.id) : true;
      return connected && matchesQuery(node, query);
    });

    const visibleIdSet = new Set(visibleNodes.map(node => node.id));
    visibleEdges = visibleEdges.filter(edge => visibleIdSet.has(edge.source) && visibleIdSet.has(edge.target));

    if (selected && !visibleIdSet.has(selected.id)) {
      selected = null;
      renderDetails(null);
    }

    scheduleDraw();
  }

  search.addEventListener('input', applyFilters);
  weight.addEventListener('change', applyFilters);
  reset.addEventListener('click', function() {
    search.value = '';
    weight.value = '1';
    selected = null;
    renderDetails(null);
    applyFilters();
  });
  window.addEventListener('resize', scheduleDraw);

  renderDetails(null);
  applyFilters();
})();
</script>
